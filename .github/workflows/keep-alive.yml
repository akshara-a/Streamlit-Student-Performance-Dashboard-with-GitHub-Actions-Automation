name: Keep Streamlit App Warm

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "STREAMLIT_APP_URL secret is missing."
            exit 1
          fi

          echo "Pinging $APP_URL"

          curl -sS -L \
            --max-time 60 \
            --max-redirs 10 \
            --retry 3 \
            --retry-delay 5 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            "$APP_URL" \
            -o /tmp/streamlit_response.html

          echo "App ping completed."
